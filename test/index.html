<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do list</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> My To-Do List</h1>
        </header>
        
        <div class="input-section">

            <div class ="input-group"> 
                <input type="text" id="inputTask" placeholder="what do you need done today" maxlength="100">
                <button id="add-btn">Add Task</button>
            </div>

            <div class ="task-stats">   
                <span id="total tasks" > Total: 0 </span>
                <span id="completed tasks"> Completed: 0 </span>
                <span id="pending tasks"> Pending: 0 </span>
            </div>

            <ul id="task-list">
            </ul>

            <div class="empty-state" id="empty-state">
                <p>no tasks yet, add your tasks</p>
            </div>

            <div id="edit-modal" class="modal"> 
                <div class ="modal-content">
                    <h3>Edit task</h3>
                    <input type="text" id="edit-input" placeholder="enter your new description">
                    <div class ="modal-actions">
                        <button id="save-edit" class="btn btn-primary">save</button>
                        <button id="cancel-edit" class="btn btn-secondary">cancel</button>
                    </div>
                </div>
            </div>

    <script src="script.js"></script>

</body>
</html>
